<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Embedded Notes — Anton Bodnia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-base:      #0d0f10;
      --bg-surface:   #141618;
      --bg-elevated:  #1c2026;
      --bg-overlay:   #252b33;
      --border-dim:   rgba(255,255,255,0.07);
      --border-mid:   rgba(255,255,255,0.14);

      /* ── Lightened text palette ── */
      --text-primary:   #f0ede8;   /* was #e8e6e0 — brighter */
      --text-secondary: #b0aca4;   /* was #8b897e — much brighter */
      --text-muted:     #6e6b63;   /* was #52504a */
      --text-faint:     #3e3c38;

      --accent:      #00d084;
      --accent-dim:  rgba(0,208,132,0.13);
      --accent-glow: rgba(0,208,132,0.06);
      --rising:  #00d084;
      --falling: #ff6b4a;
      --clk:     #4a9eff;
      --warning: #f5c842;
      --danger:  #ff4a4a;

      --font-mono: 'JetBrains Mono', 'Courier New', monospace;
      --font-sans: 'IBM Plex Sans', system-ui, sans-serif;
      --r-sm: 4px; --r-md: 6px; --r-lg: 10px; --r-xl: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* subtle grid */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,208,132,0.016) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,208,132,0.016) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    /* ══════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════ */
    .site-wrap {
      position: relative; z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 40px 120px;
    }

    /* ══════════════════════════════════════
       HEADER
    ══════════════════════════════════════ */
    .site-header {
      margin-bottom: 52px;
      padding-bottom: 40px;
      border-bottom: 1px solid var(--border-dim);
    }
    .site-eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .2em;
      color: var(--text-muted);
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .site-eyebrow::before { content: '//'; color: var(--accent); font-size: 12px; }
    .site-title {
      font-size: clamp(28px, 4.5vw, 44px);
      font-weight: 300;
      color: var(--text-primary);
      line-height: 1.1;
      margin-bottom: 14px;
    }
    .site-title-accent { color: var(--accent); }
    .site-desc {
      font-size: 16px;
      color: var(--text-secondary);
      max-width: 520px;
      line-height: 1.65;
      margin-bottom: 28px;
    }
    .site-stats {
      display: flex; gap: 36px; flex-wrap: wrap;
    }
    .stat-item {}
    .stat-val {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 500;
      color: var(--text-primary);
      display: block;
    }
    .stat-lbl {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text-muted);
    }

    /* ══════════════════════════════════════
       NOTION-STYLE FILTER BAR
       — клікабельні теги-фільтри зверху
    ══════════════════════════════════════ */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    /* кожен фільтр-тег */
    .filter-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 100px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .04em;
      cursor: pointer;
      user-select: none;
      border: 1px solid var(--border-dim);
      background: var(--bg-surface);
      color: var(--text-secondary);
      transition: all .18s;
      white-space: nowrap;
    }
    .filter-tag:hover {
      border-color: var(--border-mid);
      color: var(--text-primary);
      background: var(--bg-elevated);
    }

    /* активний тег */
    .filter-tag.active {
      color: var(--tag-color, var(--accent));
      background: color-mix(in srgb, var(--tag-color, var(--accent)) 12%, transparent);
      border-color: color-mix(in srgb, var(--tag-color, var(--accent)) 35%, transparent);
    }

    /* кнопка "×" всередині активного тега */
    .filter-tag .tag-remove {
      display: none;
      font-size: 13px;
      line-height: 1;
      opacity: .7;
      margin-left: 2px;
    }
    .filter-tag.active .tag-remove { display: inline; }

    .filter-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--tag-color, var(--accent));
      flex-shrink: 0;
    }

    /* розділювач */
    .filter-sep {
      width: 1px; height: 18px;
      background: var(--border-dim);
      flex-shrink: 0;
    }

    /* ══════════════════════════════════════
       SEARCH
    ══════════════════════════════════════ */
    .search-wrap {
      position: relative;
      margin-bottom: 40px;
    }
    .search-input {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border-dim);
      border-radius: var(--r-lg);
      padding: 11px 16px 11px 42px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-primary);
      outline: none;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }
    .search-icon {
      position: absolute; left: 15px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 15px;
      pointer-events: none;
    }

    /* ══════════════════════════════════════
       CATEGORY SECTION
    ══════════════════════════════════════ */
    .category-section { margin-bottom: 52px; }
    .category-section.hidden { display: none; }

    .cat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .cat-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .cat-name {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .18em;
      color: var(--text-secondary);   /* lightened */
      font-weight: 500;
    }
    .cat-path {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
    }
    .cat-count {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-elevated);
      border: 1px solid var(--border-dim);
      border-radius: 100px;
      padding: 1px 8px;
    }
    .cat-line { flex: 1; height: 1px; background: var(--border-dim); }

    /* ══════════════════════════════════════
       TOPIC CARDS
    ══════════════════════════════════════ */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 8px;
    }

    .topic-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-dim);
      border-radius: var(--r-xl);
      padding: 16px 18px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 9px;
      transition: border-color .18s, background .18s, transform .12s;
      position: relative;
      overflow: hidden;
    }
    .topic-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--card-color, var(--accent));
      opacity: 0;
      transition: opacity .18s;
    }
    .topic-card:hover {
      border-color: var(--border-mid);
      background: var(--bg-elevated);
      transform: translateY(-1px);
    }
    .topic-card:hover::before { opacity: 1; }

    .topic-card.soon {
      opacity: .3;
      pointer-events: none;
    }

    /* hidden by filter */
    .topic-card.filtered-out { display: none; }

    .card-top {
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .card-num {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-muted);
    }

    .card-title {
      font-size: 15px;
      font-weight: 400;
      color: var(--text-primary);   /* bright */
      line-height: 1.3;
    }
    .card-accent {
      color: var(--card-color, var(--accent));
      font-size: 11px;
      opacity: .75;
      display: block;
      margin-top: 2px;
    }

    .card-path {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-muted);
      margin-top: auto;
    }

    /* badge */
    .cbadge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 7px; border-radius: 100px;
      font-family: var(--font-mono); font-size: 9px;
      font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
      white-space: nowrap; flex-shrink: 0;
    }
    .cbadge::before { content:''; display:block; width:4px; height:4px; border-radius:50%; background:currentColor; }
    .cbadge-done    { background:rgba(0,208,132,.15); color:#00d084; border:1px solid rgba(0,208,132,.28); }
    .cbadge-soon    { background:rgba(255,255,255,.05); color:var(--text-muted); border:1px solid var(--border-dim); }

    /* ══════════════════════════════════════
       EMPTY STATE
    ══════════════════════════════════════ */
    .empty-state {
      display: none; padding: 56px 0; text-align: center;
    }
    .empty-state.visible { display: block; }
    .empty-state p {
      font-family: var(--font-mono); font-size: 12px; color: var(--text-muted);
    }

    /* ══════════════════════════════════════
       FOOTER
    ══════════════════════════════════════ */
    .site-footer {
      position: relative; z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px 40px 40px;
      border-top: 1px solid var(--border-dim);
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 12px;
    }
    .footer-links { display: flex; gap: 20px; }
    .footer-link {
      font-family: var(--font-mono); font-size: 10px;
      text-transform: uppercase; letter-spacing: .12em;
      color: var(--text-muted); text-decoration: none; transition: color .15s;
    }
    .footer-link:hover { color: var(--accent); }
    .footer-copy {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: .12em;
    }
  </style>
</head>
<body>

<div class="site-wrap">

  <!-- HEADER -->
  <header class="site-header">
    <div class="site-eyebrow">Embedded Systems · Interview Prep</div>
    <h1 class="site-title">
      Embedded<br/><span class="site-title-accent">Notes</span>
    </h1>

    </p>
    <div class="site-stats">
      <div class="stat-item">
        <span class="stat-val" id="stat-ready">0</span>

      </div>
      <div class="stat-item">
        <span class="stat-val" id="stat-total">0</span>
        <span class="stat-lbl">всього тем</span>
      </div>
      <div class="stat-item">
        <span class="stat-val" id="stat-cats">6</span>
        <span class="stat-lbl">категорій</span>
      </div>
    </div>
  </header>

  <!-- ══ FILTER BAR ══ -->
  <!--
    Теги генеруються JS-ом.
    Логіка:
      - "All"    → скидає всі фільтри (показати все)
      - "Learnt" → показати тільки done
      - Кожна категорія → показати тільки цю категорію
      - Кілька тегів = AND (multiple active = intersection)
      - Клік на активний тег або "×" = видалити тег
  -->
  <div class="filter-bar" id="filter-bar"></div>

  <!-- SEARCH -->
  <div class="search-wrap">

      class="search-input"
      id="search"

      autocomplete="off"
    />
  </div>

  <!-- CONTENT -->
  <div id="categories-container"></div>

    <p>// нічого не знайдено</p>
  </div>

<footer class="site-footer">
  <div class="footer-links">

<script>
/* ══════════════════════════════════════════════════════════
   DATA — всі теми сайту
   Щоб додати тему: додати об'єкт у відповідне місце масиву.
   Щоб зробити активною: status: 'soon' → 'done'
══════════════════════════════════════════════════════════ */
const TOPICS = [
  /* ── Електроніка ── */
  { category: 'electronics',catLabel:  'Електроніка',catColor:  '#00d084',catBadge: 'badge-rising', 
    path: 'electronics/signal-edges.html',title: 'Фронт сигналу',accent: 'Signal Edges',status: 'done' },
  { category: 'electronics',catLabel:  'Електроніка',catColor:  '#00d084',catBadge: 'badge-rising', 
    path: 'electronics/signals.html',title: 'Основи сигналів',accent: 'Basic Signals',status: 'done' },
  { category:'electronics', catLabel:'Електроніка', catColor:'#00d084',
    path:'electronics/energy-zones.html',     title:'Зонна теорія',        accent:'Energy Zones',             status:'soon' },
  { category:'electronics', catLabel:'Електроніка', catColor:'#00d084',
    path:'electronics/electromagnetic.html',  title:'ЕМ-поле',             accent:'Electromagnetic',          status:'soon' },

  /* ── Протоколи ── */
  { category:'protocols', catLabel:'Протоколи', catColor:'#4a9eff',
    path:'protocols/uart.html',                title:'UART',               accent:'Universal Async',          status:'done' },
  { category:'protocols', catLabel:'Протоколи', catColor:'#4a9eff',
    path:'protocols/i2c.html',                 title:'I²C',                accent:'Inter-Integrated Circuit', status:'soon' },
  { category:'protocols', catLabel:'Протоколи', catColor:'#4a9eff',
    path:'protocols/spi.html',                 title:'SPI',                accent:'Serial Peripheral Interface', status:'soon' },
  { category:'protocols', catLabel:'Протоколи', catColor:'#4a9eff',
    path:'protocols/adc.html',                 title:'ADC',                accent:'Analog-to-Digital',        status:'soon' },
  { category:'protocols', catLabel:'Протоколи', catColor:'#4a9eff',
    path:'protocols/dma.html',                 title:'DMA',                accent:'Direct Memory Access',     status:'soon' },
  { category:'protocols', catLabel:'Протоколи', catColor:'#4a9eff',
    path:'protocols/hardware-flow-control.html',title:'Flow Control',      accent:'HW Flow Control',          status:'soon' },
  { category:'protocols', catLabel:'Протоколи', catColor:'#4a9eff',
    path:'protocols/pwm.html',                 title:'PWM',                accent:'Pulse-Width Mod.',         status:'soon' },

  /* ── Мікроконтролер ── */
  { category:'microcontrollers', catLabel:'Мікроконтролер', catColor:'#ff6b4a',
    path:'microcontrollers/interrupts.html',   title:'Переривання',        accent:'Interrupts',               status:'done' },
  { category:'microcontrollers', catLabel:'Мікроконтролер', catColor:'#ff6b4a',
    path:'microcontrollers/prescaler.html',    title:'Прескейлер',         accent:'Prescaler',                status:'soon' },
  { category:'microcontrollers', catLabel:'Мікроконтролер', catColor:'#ff6b4a',
    path:'microcontrollers/pwm-mcu.html',      title:'ШІМ на MCU',         accent:'PWM on MCU',               status:'soon' },

  /* ── Пам'ять ── */
  { category:'microcontrollers', catLabel:'Мікроконтролер', catColor:'#ff6b4a',
  path:'microcontrollers/noise.html',
  title:'Шуми', accent:'Noise & Filtering', status:'done' },

  /* ── Архітектура ── */
  { category:'architecture', catLabel:'Архітектура', catColor:'#4a9eff',
    path:'architecture/cpu.html',              title:'CPU',                accent:'Central Proc. Unit',       status:'soon' },
  { category:'architecture', catLabel:'Архітектура', catColor:'#4a9eff',
    path:'architecture/dma-arch.html',         title:'DMA архітектура',    accent:'DMA Architecture',         status:'soon' },

  /* ── RTOS ── */
  { category:'rtos', catLabel:'RTOS', catColor:'#f5c842',
    path:'rtos/basics.html',                   title:'Основи RTOS',        accent:'RTOS Basics',              status:'soon' },
  { category:'rtos', catLabel:'RTOS', catColor:'#f5c842',
    path:'rtos/freertos.html',                 title:'FreeRTOS',           accent:'Free Real-Time OS',        status:'soon' },
  { category:'rtos', catLabel:'RTOS', catColor:'#f5c842',
    path:'rtos/semaphores.html',               title:'Семафори',           accent:'Semaphores',               status:'soon' },
];

/* ══════════════════════════════════════════════════════════
   STATE — активні фільтри
   Set<string> — може містити:
     'learnt'          → фільтр по status=done
     'electronics'     → фільтр по category
     'protocols'       → і т.д.
══════════════════════════════════════════════════════════ */
const activeFilters = new Set();
let searchQuery = '';

/* ── Визначення унікальних категорій для побудови filter-bar ── */
const CATEGORIES = [...new Map(
  TOPICS.map(t => [t.category, { key: t.category, label: t.catLabel, color: t.catColor }])
).values()];

/* ══════════════════════════════════════════════════════════
   BUILD FILTER BAR
══════════════════════════════════════════════════════════ */
function buildFilterBar() {
  const bar = document.getElementById('filter-bar');

  /* "All" — скидає всі фільтри */
  bar.innerHTML = `
    <button class="filter-tag" id="filter-all" style="--tag-color:var(--accent)"
      onclick="clearFilters()">All</button>
    <div class="filter-sep"></div>
    <button class="filter-tag" id="filter-learnt"
      style="--tag-color:#00d084"
      onclick="toggleFilter('learnt')">
      <span class="filter-dot" style="background:#00d084"></span>
      Learnt
      <span class="tag-remove">×</span>
    </button>
    <div class="filter-sep"></div>
  ` + CATEGORIES.map(cat => `
    <button class="filter-tag" id="filter-${cat.key}"
      style="--tag-color:${cat.color}"
      onclick="toggleFilter('${cat.key}')">
      <span class="filter-dot" style="background:${cat.color}"></span>
      ${cat.label}
      <span class="tag-remove">×</span>
    </button>
  `).join('');
}

/* ══════════════════════════════════════════════════════════
   FILTER LOGIC
══════════════════════════════════════════════════════════ */
function toggleFilter(key) {
  if (activeFilters.has(key)) {
    activeFilters.delete(key);
  } else {
    activeFilters.add(key);
  }
  syncFilterBar();
  applyFilters();
}

function clearFilters() {
  activeFilters.clear();
  syncFilterBar();
  applyFilters();
}

function syncFilterBar() {
  /* All button: active when nothing selected */
  const allBtn = document.getElementById('filter-all');
  if (allBtn) allBtn.classList.toggle('active', activeFilters.size === 0);

  /* Learnt button */
  const learntBtn = document.getElementById('filter-learnt');
  if (learntBtn) learntBtn.classList.toggle('active', activeFilters.has('learnt'));

  /* Category buttons */
  CATEGORIES.forEach(cat => {
    const btn = document.getElementById(`filter-${cat.key}`);
    if (btn) btn.classList.toggle('active', activeFilters.has(cat.key));
  });
}

/* ══════════════════════════════════════════════════════════
   APPLY — показати/сховати картки і секції
══════════════════════════════════════════════════════════ */
function applyFilters() {
  const q = searchQuery.toLowerCase();

  /* розбиваємо activeFilters на два типи */
  const wantLearnt     = activeFilters.has('learnt');
  const catFilters     = new Set([...activeFilters].filter(f => f !== 'learnt'));
  const hasCatFilter   = catFilters.size > 0;

  let totalVisible = 0;

  document.querySelectorAll('.topic-card').forEach(card => {
    const status   = card.dataset.status;
    const category = card.dataset.category;
    const searchText = (card.dataset.title + ' ' + card.dataset.accent + ' ' + category).toLowerCase();

    let show = true;

    /* пошуковий рядок */
    if (q && !searchText.includes(q)) show = false;

    /* фільтр Learnt */
    if (show && wantLearnt && status !== 'done') show = false;

    /* фільтр категорії (OR всередині cat-фільтрів: якщо є кілька активних cat — показує будь-яку з них) */
    if (show && hasCatFilter && !catFilters.has(category)) show = false;

    card.classList.toggle('filtered-out', !show);
    if (show) totalVisible++;
  });

  /* приховати порожні секції */
  document.querySelectorAll('.category-section').forEach(sec => {
    const visible = sec.querySelectorAll('.topic-card:not(.filtered-out)').length;
    sec.classList.toggle('hidden', visible === 0);
  });

  document.getElementById('empty-state').classList.toggle('visible', totalVisible === 0);
}

/* ══════════════════════════════════════════════════════════
   RENDER — початковий рендер всіх карток і секцій
══════════════════════════════════════════════════════════ */
function groupByCategory(topics) {
  const map = new Map();
  topics.forEach(t => {
    if (!map.has(t.category)) map.set(t.category, []);
    map.get(t.category).push(t);
  });
  return map;
}

function renderCard(t, idx) {
  const soonClass = t.status === 'soon' ? ' soon' : '';
  const badge = t.status === 'done'
    ? '<span class="cbadge cbadge-done">learnt</span>'
    : '<span class="cbadge cbadge-soon">soon</span>';
  return `
    <a href="${t.path}"
       class="topic-card${soonClass}"
       style="--card-color:${t.catColor}"
       data-status="${t.status}"
       data-category="${t.category}"
       data-title="${t.title}"
       data-accent="${t.accent}">
      <div class="card-top">
        <span class="card-num">${String(idx + 1).padStart(2,'0')}</span>
        ${badge}
      </div>
      <div class="card-title">
        ${t.title}
        <span class="card-accent">${t.accent}</span>
      </div>
      <div class="card-path">${t.path}</div>
    </a>`;
}

function renderAll() {
  const grouped = groupByCategory(TOPICS);
  const container = document.getElementById('categories-container');

  container.innerHTML = [...grouped.entries()].map(([catKey, topics]) => {
    const first = topics[0];
    const doneCount = topics.filter(t => t.status === 'done').length;
    const cards = topics.map((t, i) => renderCard(t, i)).join('');
    return `
      <section class="category-section" data-category="${catKey}">
        <div class="cat-header">
          <span class="cat-dot" style="background:${first.catColor}"></span>
          <span class="cat-name">${first.catLabel}</span>
          <span class="cat-path">${catKey}/</span>
          <span class="cat-count">${doneCount}/${topics.length}</span>
          <div class="cat-line"></div>
        </div>
        <div class="cards-grid">${cards}</div>
      </section>`;
  }).join('');

  /* stats */
  document.getElementById('stat-ready').textContent = TOPICS.filter(t => t.status === 'done').length;
  document.getElementById('stat-total').textContent  = TOPICS.length;
}

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
buildFilterBar();
renderAll();
syncFilterBar();   /* "All" = active за замовчуванням */
applyFilters();

/* Search */
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  applyFilters();
});
</script>
</body>
