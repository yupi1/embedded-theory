      --falling: #ff6b4a;
      --clk:     #4a9eff;
      --warning: #f5c842;

      --text-md: 15px; --text-lg: 17px; --text-xl: 20px;

    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: var(--text-base);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── subtle grid overlay ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,208,132,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,208,132,0.018) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 8px; border-radius: 3px;
      font-family: var(--font-mono); font-size: 10px;
      font-weight: 500; text-transform: uppercase; letter-spacing: .1em;
      white-space: nowrap;
    }
    .badge::before { content:''; display:block; width:5px; height:5px; border-radius:50%; background:currentColor; }

    .badge-rising  { background: rgba(0,208,132,.12);  color: var(--rising);  border: 1px solid rgba(0,208,132,.25); }
    .badge-falling { background: rgba(255,107,74,.12); color: var(--falling); border: 1px solid rgba(255,107,74,.25); }
    .badge-clk     { background: rgba(74,158,255,.12); color: var(--clk);     border: 1px solid rgba(74,158,255,.25); }
    .badge-warning { background: rgba(245,200,66,.12); color: var(--warning); border: 1px solid rgba(245,200,66,.25); }
    .badge-neutral { background: var(--bg-elevated); color: var(--text-secondary); border: 1px solid var(--border-dim); }

    /* ── SITE LAYOUT ── */
    .site-wrap {
      position: relative; z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 64px 40px 120px;
    }

    /* ── HEADER ── */
    .site-header {
      margin-bottom: 64px;
      padding-bottom: 48px;
      border-bottom: 1px solid var(--border-dim);
    }
    .site-header-eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .18em;
      color: var(--text-muted);
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .site-header-eyebrow::before { content: '//'; color: var(--accent); font-size: 12px; }
    .site-title {
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 300;
      color: var(--text-primary);
      line-height: 1.1;
      margin-bottom: 16px;
    }
    .site-title-accent { color: var(--accent); }
    .site-desc {
      font-size: var(--text-lg);
      color: var(--text-secondary);
      max-width: 520px;
      line-height: 1.65;
      margin-bottom: 28px;
    }
    .site-stats {
      display: flex; gap: 32px; flex-wrap: wrap;
    }
    .site-stat {
      display: flex; flex-direction: column; gap: 4px;
    }
    .site-stat-value {
      font-family: var(--font-mono);
      font-size: var(--text-2xl);
      font-weight: 500;
      color: var(--text-primary);

    .site-stat-label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text-muted);
    }

    /* ── SEARCH ── */
    .search-wrap {
      margin-bottom: 48px;
      position: relative;
    }
    .search-input {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border-dim);
      border-radius: var(--r-lg);
      padding: 12px 16px 12px 44px;
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--text-primary);
      outline: none;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }
    .search-icon {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-mono); font-size: 14px;
      color: var(--text-muted); pointer-events: none;

      margin-bottom: 56px;
    }
    .category-header {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 16px;
    }
    .category-line {

      background: var(--border-dim);
    }
    .category-label {
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .category-dot {
      width: 8px; height: 8px; border-radius: 50%;

    }
    .category-name {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .16em;
      color: var(--text-muted);
    }
    .category-path {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      opacity: .5;
    }
    .category-count {

      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-elevated);
      border: 1px solid var(--border-dim);
      border-radius: 100px;
      padding: 1px 8px;
    }

    /* ── TOPIC CARDS GRID ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }

    /* ── TOPIC CARD ── */
    .topic-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-dim);
      border-radius: var(--r-xl);
      padding: 18px 20px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color .2s, background .2s, transform .15s;
      position: relative;
      overflow: hidden;
    }
    .topic-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--card-color, var(--accent));
      opacity: 0;
      transition: opacity .2s;
    }
    .topic-card:hover {
      border-color: var(--border-mid);
      background: var(--bg-elevated);
      transform: translateY(-1px);
    }
    .topic-card:hover::before { opacity: 1; }

    /* soon = not written yet */
    .topic-card.soon {
      opacity: .35;
      pointer-events: none;
    }

    .card-top {
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .card-num {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-muted);

    .card-path {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-muted);
      margin-top: auto;
    }

    .empty-state {
      display: none;
      padding: 48px 0;
      text-align: center;
    }

</head>

/* ════════════════════════════════════════════════════════
   RENDER
   ════════════════════════════════════════════════════════ */
const container = document.getElementById('categories-container');
const emptyState = document.getElementById('empty-state');

function groupByCategory(topics) {
  const map = new Map();
  topics.forEach(t => {
    if (!map.has(t.category)) map.set(t.category, []);
    map.get(t.category).push(t);
  });
  return map;
}

function statusBadge(status) {
  if (status === 'done') return '<span class="badge badge-rising badge-pill">learnt</span>';
  return '<span class="badge badge-neutral badge-pill">soon</span>';
}

function renderTopicCard(t, idx) {
  const soonClass = t.status === 'soon' ? ' soon' : '';
  return `
    <a href="${t.path}" class="topic-card${soonClass}" style="--card-color:${t.catColor}">
      <div class="card-top">
        <span class="card-num">${String(idx + 1).padStart(2,'0')}</span>
        <span class="card-status">${statusBadge(t.status)}</span>
      </div>
      <div class="card-title">
        ${t.title}<br/>
        <span class="card-title-accent" style="font-size:12px;opacity:.7">${t.accent}</span>
      </div>
      <div class="card-path">${t.path}</div>
    </a>`;
}

function renderCategory(catKey, topics) {
  if (topics.length === 0) return '';
  const first = topics[0];
  const doneCount = topics.filter(t => t.status === 'done').length;
  const cards = topics.map((t, i) => renderTopicCard(t, i)).join('');
  return `
    <section class="category-section" data-category="${catKey}">
      <div class="category-header">
        <div class="category-label">
          <span class="category-dot" style="background:${first.catColor}"></span>
          <span class="category-name">${first.catLabel}</span>
          <span class="category-path">${catKey}/</span>
        </div>
        <span class="category-count">${doneCount}/${topics.length}</span>
        <div class="category-line"></div>
      </div>
      <div class="cards-grid">${cards}</div>
    </section>`;
}

function render(filter = '') {
  const q = filter.toLowerCase().trim();
  const filtered = q
    ? TOPICS.filter(t =>
        t.title.toLowerCase().includes(q) ||
        t.accent.toLowerCase().includes(q) ||
        t.catLabel.toLowerCase().includes(q) ||
        t.category.toLowerCase().includes(q) ||
        t.path.toLowerCase().includes(q)
      )
    : TOPICS;

  const grouped = groupByCategory(filtered);
  const html = [...grouped.entries()].map(([k, v]) => renderCategory(k, v)).join('');
  container.innerHTML = html;

  const hasResults = filtered.length > 0;
  emptyState.classList.toggle('visible', !hasResults);

  // Update stats
  const ready = TOPICS.filter(t => t.status === 'done').length;
  const total = TOPICS.length;
  document.getElementById('stat-ready').textContent = ready;
  document.getElementById('stat-total').textContent = total;
}

// Initial render
