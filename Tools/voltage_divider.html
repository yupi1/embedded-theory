<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подільник напруги — калькулятор</title>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a1a;
    color: #e8e6de;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 40px 24px 60px;
  }

  h1 {
    text-align: center;
    font-size: 18px;
    font-weight: 500;
    color: #9a9890;
    margin-bottom: 32px;
    letter-spacing: .02em;
  }

  /* ── формула ── */
  #formula-wrap {
    text-align: center;
    margin-bottom: 40px;
    font-size: 20px;
    color: #e8e6de;
    min-height: 60px;
  }

  /* ── основний layout ── */
  .main {
    display: flex;
    gap: 40px;
    max-width: 900px;
    margin: 0 auto;
    flex-wrap: wrap;
    align-items: flex-start;
  }

  /* ── ліва панель ── */
  .left { flex: 1; min-width: 280px; }

  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .ctrl-row label {
    font-size: 14px;
    color: #9a9890;
    min-width: 52px;
  }
  .ctrl-row input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: #3a3a3a;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .ctrl-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #9a9890;
    border: 2px solid #1a1a1a;
    cursor: pointer;
  }
  .ctrl-row input[type=range]::-moz-range-thumb {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #9a9890;
    border: 2px solid #1a1a1a;
    cursor: pointer;
  }
  .ctrl-row .val {
    font-size: 14px;
    font-weight: 600;
    color: #e8e6de;
    min-width: 60px;
    text-align: right;
  }

  .metrics { margin-top: 8px; }
  .metric {
    background: #252525;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 10px;
  }
  .metric .mlbl {
    font-size: 12px;
    color: #6a6860;
    margin-bottom: 4px;
  }
  .metric .mval {
    font-size: 24px;
    font-weight: 600;
    color: #e8e6de;
  }
  .metric .mval span {
    font-size: 14px;
    font-weight: 400;
    color: #9a9890;
  }

  .warn {
    font-size: 13px;
    padding: 10px 16px;
    border-radius: 8px;
    margin-top: 4px;
    font-weight: 500;
  }
  .warn-ok      { background: #1a3320; color: #4ade80; border: 1px solid #2a5535; }
  .warn-bad     { background: #3b1a1a; color: #f87171; border: 1px solid #6b2a2a; }
  .warn-caution { background: #3b2e10; color: #fbbf24; border: 1px solid #6b5520; }

  /* ── права панель: схема SVG ── */
  .right {
    flex: 0 0 280px;
    min-width: 220px;
  }

  svg { width: 100%; height: auto; display: block; }
</style>
</head>
<body>

<h1>Подільник напруги · Li-Ion → STM32 ADC</h1>

<!-- формула (рендериться MathJax) -->
<div id="formula-wrap">
  <span id="formula-tex"></span>
</div>

<div class="main">
  <!-- ліва: контролери + метрики -->
  <div class="left">
    <div class="ctrl-row">
      <label>V_bat</label>
      <input type="range" id="vbat" min="270" max="420" step="1" value="420">
      <span class="val" id="vbat-lbl">4.20 V</span>
    </div>
    <div class="ctrl-row">
      <label>R1</label>
      <input type="range" id="r1" min="10" max="500" step="10" value="100">
      <span class="val" id="r1-lbl">100 kΩ</span>
    </div>
    <div class="ctrl-row">
      <label>R2</label>
      <input type="range" id="r2" min="10" max="500" step="10" value="100">
      <span class="val" id="r2-lbl">100 kΩ</span>
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="mlbl">V_adc (на вузлі A)</div>
        <div class="mval" id="vadc-val">2.10 <span>V</span></div>
      </div>
      <div class="metric">
        <div class="mlbl">Коефіцієнт ділення</div>
        <div class="mval" id="ratio-val">÷ 2.00</div>
      </div>
      <div class="metric">
        <div class="mlbl">Струм через подільник</div>
        <div class="mval" id="curr-val">21.0 <span>µA</span></div>
      </div>
      <div class="warn warn-ok" id="warn-box">V_adc в безпечному діапазоні для STM32 ADC.</div>
    </div>
  </div>

  <!-- права: схема -->
  <div class="right">
    <svg viewBox="0 0 240 320" xmlns="http://www.w3.org/2000/svg">

      <!-- BAT+ рейл -->
      <line x1="40" y1="30" x2="200" y2="30" stroke="#D85A30" stroke-width="1.8"/>
      <text x="42" y="22" font-size="12" fill="#D85A30" font-weight="600" font-family="sans-serif">BAT+</text>
      <text x="148" y="22" font-size="12" fill="#D85A30" font-weight="600" font-family="sans-serif" id="sv-vbat">4.20 V</text>

      <!-- дріт BAT+ → R1 -->
      <line x1="120" y1="30" x2="120" y2="58" stroke="#D85A30" stroke-width="1.8"/>

      <!-- R1 -->
      <rect x="88" y="58" width="64" height="72" rx="7"
            stroke="#D85A30" stroke-width="1.8" fill="#252525"/>
      <text x="120" y="91" font-size="14" font-weight="600" text-anchor="middle" fill="#e8e6de" font-family="sans-serif">R1</text>
      <text x="120" y="110" font-size="12" text-anchor="middle" fill="#9a9890" font-family="sans-serif" id="sv-r1">100 kΩ</text>

      <!-- мітка падіння R1 -->
      <line x1="54" y1="94" x2="88" y2="94" stroke="#D85A30" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="52" y="98" font-size="11" fill="#D85A30" text-anchor="end" font-family="sans-serif" id="sv-vr1">2.10 V</text>

      <!-- дріт R1 → вузол A -->
      <line x1="120" y1="130" x2="120" y2="158" stroke="#e8e6de" stroke-width="1.8" opacity=".7"/>

      <!-- вузол A -->
      <circle cx="120" cy="162" r="5" fill="#e8e6de"/>

      <!-- мітка V_adc на вузлі -->
      <text x="130" y="158" font-size="12" fill="#378ADD" font-weight="600" font-family="sans-serif" id="sv-vadc">2.10 V</text>

      <!-- дріт вузол → ADC праворуч -->
      <line x1="125" y1="162" x2="190" y2="162" stroke="#378ADD" stroke-width="1.8"/>
      <text x="194" y="166" font-size="12" fill="#378ADD" font-weight="600" font-family="sans-serif">ADC</text>

      <!-- дріт вузол → R2 вниз -->
      <line x1="120" y1="167" x2="120" y2="178" stroke="#e8e6de" stroke-width="1.8" opacity=".7"/>

      <!-- R2 -->
      <rect x="88" y="178" width="64" height="72" rx="7"
            stroke="#378ADD" stroke-width="1.8" fill="#252525"/>
      <text x="120" y="211" font-size="14" font-weight="600" text-anchor="middle" fill="#e8e6de" font-family="sans-serif">R2</text>
      <text x="120" y="230" font-size="12" text-anchor="middle" fill="#9a9890" font-family="sans-serif" id="sv-r2">100 kΩ</text>

      <!-- мітка падіння R2 -->
      <line x1="54" y1="214" x2="88" y2="214" stroke="#378ADD" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="52" y="218" font-size="11" fill="#378ADD" text-anchor="end" font-family="sans-serif" id="sv-vr2">2.10 V</text>

      <!-- дріт R2 → GND рейл -->
      <line x1="120" y1="250" x2="120" y2="272" stroke="#888780" stroke-width="1.8"/>
      <circle cx="120" cy="272" r="5" fill="#888780" opacity=".8"/>

      <!-- GND рейл -->
      <line x1="40" y1="272" x2="200" y2="272" stroke="#888780" stroke-width="1.8"/>
      <!-- GND символ -->
      <line x1="120" y1="272" x2="120" y2="282" stroke="#888780" stroke-width="1.8"/>
      <line x1="105" y1="282" x2="135" y2="282" stroke="#888780" stroke-width="1.8"/>
      <line x1="110" y1="289" x2="130" y2="289" stroke="#888780" stroke-width="1.2"/>
      <line x1="115" y1="296" x2="125" y2="296" stroke="#888780" stroke-width=".8"/>
      <text x="42" y="287" font-size="12" fill="#888780" font-family="sans-serif">GND  0 V</text>

    </svg>
  </div>
</div>

<script>
const vbatEl = document.getElementById('vbat');
const r1El   = document.getElementById('r1');
const r2El   = document.getElementById('r2');

function renderFormula(vbat, r1, r2, vadc) {
  const tex = `V_{out} = V_{in} \\times \\dfrac{R2}{R1+R2} = ${vbat.toFixed(1)} \\times \\dfrac{${r2}k}{${r1+r2}k} = ${vadc.toFixed(2)}\\text{ V}`;
  const wrap = document.getElementById('formula-tex');
  wrap.innerHTML = '\\(' + tex + '\\)';
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([wrap]).catch(() => {});
  }
}

function update() {
  const vbat = vbatEl.value / 100;
  const r1   = parseInt(r1El.value);
  const r2   = parseInt(r2El.value);

  const vadc  = vbat * r2 / (r1 + r2);
  const ratio = (r1 + r2) / r2;
  const curr  = vbat / (r1 + r2) * 1000;
  const vr1   = vbat - vadc;

  document.getElementById('vbat-lbl').textContent = vbat.toFixed(2) + ' V';
  document.getElementById('r1-lbl').textContent   = r1 + ' kΩ';
  document.getElementById('r2-lbl').textContent   = r2 + ' kΩ';
  document.getElementById('vadc-val').innerHTML   = vadc.toFixed(2) + ' <span>V</span>';
  document.getElementById('ratio-val').textContent = '÷ ' + ratio.toFixed(2);
  document.getElementById('curr-val').innerHTML   = curr.toFixed(1) + ' <span>µA</span>';

  document.getElementById('sv-vbat').textContent = vbat.toFixed(2) + ' V';
  document.getElementById('sv-r1').textContent   = r1 + ' kΩ';
  document.getElementById('sv-r2').textContent   = r2 + ' kΩ';
  document.getElementById('sv-vadc').textContent = vadc.toFixed(2) + ' V';
  document.getElementById('sv-vr1').textContent  = vr1.toFixed(2) + ' V';
  document.getElementById('sv-vr2').textContent  = vadc.toFixed(2) + ' V';

  const warn = document.getElementById('warn-box');
  if (vadc > 3.3) {
    warn.className = 'warn warn-bad';
    warn.textContent = 'V_adc > 3.3 V — перевищує VREF+, ADC пошкодиться!';
  } else if (vadc > 3.0) {
    warn.className = 'warn warn-caution';
    warn.textContent = 'V_adc близько до межі 3.3 V — малий запас.';
  } else {
    warn.className = 'warn warn-ok';
    warn.textContent = 'V_adc в безпечному діапазоні для STM32 ADC.';
  }

  renderFormula(vbat, r1, r2, vadc);
}

vbatEl.addEventListener('input', update);
r1El.addEventListener('input', update);
r2El.addEventListener('input', update);

window.addEventListener('load', () => { update(); });
</script>
</body>
</html>
